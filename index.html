<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EA Digital Card</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:tahoma;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);
padding:40px;
border-radius:25px;
text-align:center;
width:320px;
}

img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:20px;
}

a{
display:block;
margin:12px 0;
padding:12px;
background:#ffffff22;
color:white;
text-decoration:none;
border-radius:12px;
transition:.3s;
}

a:hover{
background:#ffffff44;
}
</style>

</head>

<body>

<div class="card">

<h1>EA</h1>

<p>کارت ویزیت دیجیتال</p>

<a href="#">تماس</a>

<a href="#">واتساپ</a>

<a href="#">تلگرام</a>

<a href="#">اینستاگرام</a>

</div>

</body>
</html>
